# pyproject.toml — tool configuration for the Lead Processor MVP.
# Scope of subtask 0.2: Ruff (lint) + mypy (types) ONLY.
# pytest configuration is added later in subtask 0.3.

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, B: flake8-bugbear,
# UP: pyupgrade, N: pep8-naming
select = ["E", "W", "F", "I", "B", "UP", "N"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

